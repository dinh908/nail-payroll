<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Nail Payroll</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>💅 Nail Payroll</h1>

</div>

<div class="tabs">

<button class="tab active"
onclick="showTab('tickets')">
Travel Ticket
</button>

<button class="tab"
onclick="showTab('payroll')">
Payroll
</button>

</div>

<div id="tickets">

<div class="card">

<h2>Add Ticket</h2>

<input type="date" id="date">

<div class="quickButtons">

<button onclick="quickFill('Pedi')">Pedi</button>

<button onclick="quickFill('Mani')">Mani</button>

<button onclick="quickFill('Full Set')">
Full Set
</button>

<button onclick="quickFill('Fill')">
Fill
</button>

</div>

<input
id="service"
placeholder="Service name">

<input
id="amount"
placeholder="Service amount"
type="number">

<input
id="tip"
placeholder="Tip"
type="number">

<button
class="saveButton"
onclick="saveTicket()">

Add Ticket

</button>

</div>


<div class="card">

<h2>History</h2>

<div id="ticketList">

</div>

</div>

</div>


<div
id="payroll"
style="display:none">

<div class="card summary">

<h2>Payroll Summary</h2>

<p>Total Service:
<span id="totalService">
0
</span></p>

<p>Total Tip:
<span id="totalTip">
0
</span></p>

<p>55% Profit:
<span id="profit">
0
</span></p>

<p>Paid Total:
<span id="paid">
0
</span></p>

<p>Working Days:
<span id="days">
0
</span></p>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
